# Supabase CLI configuration — Build One Timesheets
project_id = "buildone-timesheets"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "buildone://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = false   # employees are provisioned by admins, not self-signup

[auth.email]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = true
